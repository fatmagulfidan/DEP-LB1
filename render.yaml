services:
  - type: web
    name: weather-app
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_HOST
        fromDatabase:
          name: weather-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: weather-db
          property: port
      - key: DB_USER
        fromDatabase:
          name: weather-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: weather-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: weather-db
          property: database
      - key: OPENWEATHER_API_KEY
        sync: false
databases:
  - name: weather-db
    databaseName: weather_db
    plan: free
